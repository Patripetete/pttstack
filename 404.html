<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — [Ptt]Stack</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --bg: #050507; --accent: #00e5a0; --text: #f0f0f8;
      --text-muted: #7a7a9a; --border: #2a2a38; --surface: #1a1a24;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); display: flex;
      align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3; }
    .content {
      position: relative; z-index: 1; text-align: center;
      padding: 2rem; max-width: 520px;
    }
    .code {
      font-family: var(--mono); font-size: 7rem; font-weight: 700;
      color: var(--accent); line-height: 1;
      text-shadow: 0 0 60px rgba(0,229,160,0.3);
    }
    .label {
      font-family: var(--mono); color: var(--text-muted);
      font-size: 0.85rem; margin: 1rem 0 0.5rem;
    }
    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 1rem; }
    p { color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--accent); color: #000; padding: 0.75rem 1.75rem;
      border-radius: 8px; font-weight: 700; font-family: var(--mono);
      font-size: 0.9rem; text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,160,0.3); }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="content">
    <div class="code">404</div>
    <div class="label">// page_not_found</div>
    <h1>Esta ruta no existe</h1>
    <p>La página que buscas no está aquí o fue movida.<br />Vuelve al inicio y sigue explorando.</p>
    <a href="/" class="btn"><span>← Volver al inicio</span></a>
  </div>
  <script>
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, dots = [], rafId;
      const SPACING = 48, R = 1.1, COLOR = '0, 229, 160';
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        dots = [];
        const cols = Math.ceil(W / SPACING) + 1;
        const rows = Math.ceil(H / SPACING) + 1;
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++)
            dots.push({ x: c * SPACING, y: r * SPACING, a: 0.06 + Math.random() * 0.06 });
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (const d of dots) {
          ctx.beginPath(); ctx.arc(d.x, d.y, R, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${COLOR}, ${d.a})`; ctx.fill();
        }
        rafId = requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(rafId); else draw();
      });
      resize(); draw();
    })();
  </script>
</body>
</html>
